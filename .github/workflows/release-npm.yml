name: Release NPM Packages

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    name: Build & Publish to NPM
    runs-on: ubuntu-latest

    environment: production

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Publish runtime (tannijs)
        working-directory: packages/runtime
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view tannijs version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm publish --no-git-checks --access public
          else
            echo "tannijs@$LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish compiler (tannijs-compiler)
        working-directory: packages/compiler
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view tannijs-compiler version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm publish --no-git-checks --access public
          else
            echo "tannijs-compiler@$LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vite-plugin (vite-plugin-tannijs)
        working-directory: packages/vite-plugin
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          REMOTE=$(npm view vite-plugin-tannijs version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" != "$REMOTE" ]; then
            pnpm publish --no-git-checks --access public
          else
            echo "vite-plugin-tannijs@$LOCAL already published, skipping"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
